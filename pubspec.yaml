name: hostelhub
description: "Smart Hostel Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  provider: ^6.1.1
  go_router: ^13.1.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.3.3
  flutter_local_notifications: ^17.2.4
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.0
  google_fonts: ^6.1.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
